<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紹介手数料 還元・支払明細システム</title>
<style>
:root{
  --ink:#16202e;        /* 深いインク */
  --ink-2:#33414f;
  --paper:#f5f7fa;      /* 冷たい紙色（クリーム回避）*/
  --surface:#ffffff;
  --line:#e2e7ee;
  --line-strong:#cfd6e0;
  --teal:#0f766e;       /* お金=確定の色 */
  --teal-d:#0b5a54;
  --amber:#b45309;      /* 免税/8% の注意色 */
  --amber-bg:#fef4e6;
  --red:#b42318;
  --muted:#6b7785;
  --muted-2:#9aa4b1;
  --shadow:0 1px 2px rgba(16,32,46,.06),0 8px 24px rgba(16,32,46,.06);
  --radius:10px;
  --jp:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",YuGothic,"Meiryo",sans-serif;
  --mono:"SFMono-Regular",ui-monospace,"Roboto Mono","DejaVu Sans Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--jp);
  background:var(--paper);
  color:var(--ink);
  font-size:14px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
/* 数字は等幅・揃える */
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;}
.yen::before{content:"¥";opacity:.55;margin-right:1px;font-family:var(--mono);}

/* ===== レイアウト ===== */
.app{display:flex;min-height:100vh}
.sidebar{
  width:236px;flex:0 0 236px;background:var(--ink);color:#cdd6e2;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
}
.brand{padding:22px 22px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .logo{font-weight:800;letter-spacing:.04em;color:#fff;font-size:17px}
.brand .logo span{color:var(--teal);}
.brand .sub{font-size:11px;color:#8a97a6;margin-top:3px;letter-spacing:.02em}
.nav{padding:10px 12px;flex:1}
.nav button{
  width:100%;text-align:left;background:none;border:0;color:#aeb9c7;
  padding:10px 14px;border-radius:8px;cursor:pointer;font-size:13.5px;font-family:var(--jp);
  display:flex;align-items:center;gap:10px;margin-bottom:2px;transition:.12s;
}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
.nav button.active{background:var(--teal);color:#fff;font-weight:600}
.nav .ico{width:18px;text-align:center;opacity:.9}
.sidebar .foot{padding:14px 18px;font-size:10.5px;color:#6c7888;border-top:1px solid rgba(255,255,255,.08)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  background:var(--surface);border-bottom:1px solid var(--line);
  padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;
  position:sticky;top:0;z-index:5;
}
.topbar h1{font-size:18px;margin:0;font-weight:700}
.topbar .desc{font-size:12px;color:var(--muted);margin-top:2px}
.content{padding:24px 28px 60px;max-width:1180px;width:100%}

/* ===== 部品 ===== */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card+.card{margin-top:18px}
.card-h{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-h h2{font-size:14.5px;margin:0;font-weight:700;letter-spacing:.01em}
.card-b{padding:18px 20px}

.btn{
  font-family:var(--jp);font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;
  padding:9px 16px;border:1px solid var(--line-strong);background:#fff;color:var(--ink);transition:.12s;
  display:inline-flex;align-items:center;gap:7px;
}
.btn:hover{background:#f1f4f8}
.btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}
.btn.primary:hover{background:var(--teal-d)}
.btn.ghost{border-color:transparent;background:transparent;color:var(--muted)}
.btn.ghost:hover{background:#eef1f5;color:var(--ink)}
.btn.danger{color:var(--red);border-color:#f0c8c4}
.btn.danger:hover{background:#fdf1f0}
.btn.sm{padding:5px 11px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}

.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:5px}
.field .hint{font-size:11px;color:var(--muted);font-weight:400;margin-left:6px}
input,select,textarea{
  width:100%;font-family:var(--jp);font-size:13.5px;padding:9px 11px;
  border:1px solid var(--line-strong);border-radius:8px;background:#fff;color:var(--ink);transition:.12s;
}
input.num,select.num{font-family:var(--mono)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(15,118,110,.12)}
textarea{resize:vertical;min-height:64px;line-height:1.5}
.grid{display:grid;gap:14px}
.grid.c2{grid-template-columns:1fr 1fr}
.grid.c3{grid-template-columns:1fr 1fr 1fr}
.grid.c4{grid-template-columns:repeat(4,1fr)}
@media(max-width:760px){.grid.c2,.grid.c3,.grid.c4{grid-template-columns:1fr}}

/* テーブル */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
th{font-size:11px;font-weight:700;color:var(--muted);text-transform:none;letter-spacing:.02em;background:#fafbfc;white-space:nowrap}
td.r,th.r{text-align:right}
tbody tr:hover{background:#f8fafc}
.tbl-wrap{overflow-x:auto}

.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;line-height:1.5}
.tag.indiv{background:#eef2f9;color:#3a4f7a}
.tag.corp{background:#e9f2f0;color:#0b5a54}
.tag.reg{background:#e9f2f0;color:#0b5a54}
.tag.noreg{background:var(--amber-bg);color:var(--amber)}
.tag.r8{background:var(--amber-bg);color:var(--amber)}
.tag.r10{background:#eef2f9;color:#3a4f7a}
.tag.paid{background:#e9f2f0;color:#0b5a54}
.tag.unpaid{background:#fdeeec;color:var(--red)}

.empty{padding:40px 20px;text-align:center;color:var(--muted)}
.empty .big{font-size:15px;color:var(--ink-2);font-weight:600;margin-bottom:6px}

/* 統計タイル */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
@media(max-width:760px){.stats{grid-template-columns:1fr 1fr}}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.stat .k{font-size:11.5px;color:var(--muted);font-weight:600}
.stat .v{font-size:24px;font-weight:800;margin-top:6px;letter-spacing:-.01em}
.stat .v small{font-size:13px;font-weight:600;color:var(--muted);margin-left:2px}
.stat.accent .v{color:var(--teal)}
.stat.warn .v{color:var(--amber)}

/* 計算プレビュー */
.calc{background:#f8fafc;border:1px dashed var(--line-strong);border-radius:10px;padding:14px 16px}
.calc-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.calc-row.total{border-top:1px solid var(--line-strong);margin-top:6px;padding-top:9px;font-weight:800;font-size:16px}
.calc-row .lbl{color:var(--muted)}

/* モーダル */
.modal-bg{position:fixed;inset:0;background:rgba(16,32,46,.45);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:40px 16px;overflow:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;max-width:620px;width:100%;box-shadow:0 24px 60px rgba(16,32,46,.25);animation:pop .16s ease}
@keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal-h h3{margin:0;font-size:16px}
.modal-b{padding:20px 22px;max-height:64vh;overflow:auto}
.modal-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.x{border:0;background:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.toolbar .spacer{flex:1}
.search{position:relative}
.search input{padding-left:32px;min-width:220px}
.search::before{content:"⌕";position:absolute;left:11px;top:8px;color:var(--muted-2);font-size:16px}

.notice{font-size:12px;color:var(--amber);background:var(--amber-bg);border:1px solid #f3dcbf;border-radius:8px;padding:10px 13px;margin-bottom:14px;display:flex;gap:8px}
.notice .i{font-weight:800}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:.25s;z-index:99;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== 明細書プレビュー ===== */
.doc{background:#fff;color:#1a1a1a;font-size:13px;line-height:1.7}
.doc *{font-family:var(--jp)}
.doc .num{font-family:var(--mono)}
.doc-inner{padding:38px 42px}
.doc h2.title{text-align:center;font-size:22px;letter-spacing:.4em;margin:0 0 4px;padding-left:.4em;font-weight:700}
.doc .docsub{text-align:center;font-size:11px;color:#666;margin-bottom:24px;letter-spacing:.06em}
.doc-meta{display:flex;justify-content:space-between;gap:30px;margin-bottom:22px}
.doc-to{flex:1}
.doc-to .name{font-size:17px;font-weight:700;border-bottom:1.5px solid #1a1a1a;padding-bottom:5px;display:inline-block;min-width:200px;margin-bottom:8px}
.doc-to .line{font-size:12px;color:#444}
.doc-from{text-align:right;font-size:12px;color:#333;min-width:230px}
.doc-from .co{font-size:15px;font-weight:700;color:#111;margin-bottom:3px}
.doc-no{font-size:11px;color:#666;text-align:right;margin-bottom:4px}
.doc-claim{background:#f3f5f8;border:1px solid #d8dee6;border-radius:8px;padding:14px 18px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:center}
.doc-claim .l{font-size:13px;font-weight:700}
.doc-claim .amt{font-size:26px;font-weight:800;letter-spacing:.01em}
.doc-claim .amt .yen2{font-size:18px;margin-right:3px}
.doc table{font-size:12.5px;margin-bottom:18px}
.doc table th{background:#1a2332;color:#fff;font-weight:600;border:1px solid #1a2332;padding:8px 10px}
.doc table td{border:1px solid #d8dee6;padding:8px 10px}
.doc table tfoot td{background:#f3f5f8;font-weight:700}
.doc-tax{margin-left:auto;width:300px;font-size:12.5px}
.doc-tax td{border:1px solid #d8dee6;padding:7px 11px}
.doc-tax .grand td{background:#1a2332;color:#fff;font-weight:800;font-size:14px}
.doc-bank{margin-top:22px;border:1px solid #d8dee6;border-radius:8px;padding:13px 16px;font-size:12px}
.doc-bank .h{font-weight:700;margin-bottom:5px;font-size:12px}
.doc-note{margin-top:16px;font-size:11px;color:#666;white-space:pre-wrap}
.doc-agree{margin-top:24px;font-size:10.5px;color:#777;border-top:1px solid #e2e7ee;padding-top:10px}

@media print{
  @page{size:A4;margin:14mm}
  body{background:#fff;font-size:12px}
  .sidebar,.topbar,.no-print,.modal-f,.modal-h .x{display:none !important}
  .app,.main,.content{display:block;padding:0;margin:0;max-width:none}
  .modal-bg{position:static;background:none;display:block;padding:0;overflow:visible}
  .modal{box-shadow:none;max-width:none;border-radius:0}
  .modal-b{max-height:none;overflow:visible;padding:0}
  .doc-inner{padding:0}
  .card{box-shadow:none;border:0}
}
</style>
</head>
<body>
<div class="app">
  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">LIAS<span>&middot;</span>Referral</div>
      <div class="sub">紹介手数料 還元・支払管理</div>
    </div>
    <nav class="nav" id="nav">
      <button data-tab="dashboard" class="active"><span class="ico">▤</span>ダッシュボード</button>
      <button data-tab="sources"><span class="ico">◍</span>紹介元 管理</button>
      <button data-tab="deals"><span class="ico">✎</span>紹介取引 登録</button>
      <button data-tab="statement"><span class="ico">▦</span>支払明細書 発行</button>
      <button data-tab="csv"><span class="ico">⇪</span>CSV取込（Bカート）</button>
      <button data-tab="settings"><span class="ico">⚙</span>設定 / バックアップ</button>
    </nav>
    <div class="foot">データはこのブラウザ内に保存されます（端末間で共有する場合は設定からエクスポート/インポート、または Firebase 連携を推奨）。</div>
  </aside>

  <!-- メイン -->
  <main class="main">
    <div class="topbar">
      <div>
        <h1 id="pageTitle">ダッシュボード</h1>
        <div class="desc" id="pageDesc">紹介還元の状況と未払いを確認します</div>
      </div>
      <div id="topActions"></div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- モーダル群 -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   ストレージ
========================================================= */
const KEY="lias_referral_v1";
const DEFAULT={
  company:{
    name:"リアス株式会社",
    address:"",
    tel:"",
    invoiceNumber:"",   // 自社のインボイス登録番号 T+13桁
    rep:"",             // 代表者
    bank:{bank:"",branch:"",type:"普通",number:"",holder:""}
  },
  settings:{
    rounding:"floor",                 // floor / round / ceil
    docTitle:"請求書",                // 明細書のタイトル
    closingDay:31                     // 締め日（参考表示）
  },
  sources:[],
  deals:[],
  productMargins:{}                   // 商品管理番号 -> 既定マージン率（取込時の初期値）
};
function load(){
  try{const r=localStorage.getItem(KEY);if(r){
    const db=Object.assign({},DEFAULT,JSON.parse(r));
    db.settings=Object.assign({},DEFAULT.settings,db.settings||{});
    if(db.settings.docTitle==="支払明細書")db.settings.docTitle="請求書"; // 旧既定から移行
    return db;
  }}
  catch(e){console.warn(e);}
  return JSON.parse(JSON.stringify(DEFAULT));
}
let DB=load();
function save(){localStorage.setItem(KEY,JSON.stringify(DB));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

/* =========================================================
   計算ロジック
========================================================= */
function roundFn(n){
  const m=DB.settings.rounding;
  if(m==="round")return Math.round(n);
  if(m==="ceil")return Math.ceil(n);
  return Math.floor(n); // 既定：切り捨て
}
// 1取引の手数料（税抜）= 対象金額 × マージン率%
function feeOf(deal){ return roundFn(deal.baseAmount * deal.marginRate/100); }
// 取引ごとの参考税額（明細書では税率ごとに合算後1回端数処理する）
function lineTaxOf(deal){ return roundFn(feeOf(deal) * effRate(deal)/100); }
// 適用税率：取引の上書き → 紹介元の既定 → 10%
function effRate(deal){
  if(deal.taxRateOverride===8||deal.taxRateOverride===10)return deal.taxRateOverride;
  const s=DB.sources.find(s=>s.id===deal.sourceId);
  return s? s.taxRate : 10;
}
function yen(n){ return (n<0?"-":"")+Math.abs(Math.round(n)).toLocaleString("ja-JP"); }
function srcName(id){const s=DB.sources.find(s=>s.id===id);return s?s.name:"（削除済）";}

/* =========================================================
   画面ルーティング
========================================================= */
const PAGES={
  dashboard:{t:"ダッシュボード",d:"紹介還元の状況と未払いを確認します",render:renderDashboard},
  sources:{t:"紹介元 管理",d:"個人・法人の紹介元と税率・振込先を管理します",render:renderSources},
  deals:{t:"紹介取引 登録",d:"購入のたびに紹介元・商品・マージン率を登録します",render:renderDeals},
  statement:{t:"支払明細書 発行",d:"紹介元に代わって弊社が手数料の明細書を発行します",render:renderStatement},
  csv:{t:"CSV取込（Bカート）",d:"受注CSVを取り込み、商品明細から還元取引を自動作成します",render:renderImport},
  settings:{t:"設定 / バックアップ",d:"自社情報・端数処理・データの書き出し/読み込み",render:renderSettings}
};
let current="dashboard";
function go(tab){
  current=tab;
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  document.getElementById("pageTitle").textContent=PAGES[tab].t;
  document.getElementById("pageDesc").textContent=PAGES[tab].d;
  document.getElementById("topActions").innerHTML="";
  PAGES[tab].render();
}
document.getElementById("nav").addEventListener("click",e=>{
  const b=e.target.closest("button");if(b)go(b.dataset.tab);
});

/* =========================================================
   ダッシュボード
========================================================= */
function renderDashboard(){
  const c=document.getElementById("content");
  const deals=DB.deals;
  let totalFee=0,totalTax=0,unpaidTotal=0,unpaidCount=0;
  deals.forEach(d=>{
    const f=feeOf(d),t=lineTaxOf(d);
    totalFee+=f;totalTax+=t;
    if(!d.paid){unpaidTotal+=f+t;unpaidCount++;}
  });
  const totalPay=totalFee+totalTax;

  // 今月
  const now=new Date(),ym=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  let monthPay=0;
  deals.forEach(d=>{ if((d.date||"").slice(0,7)===ym) monthPay+=feeOf(d)+lineTaxOf(d); });

  c.innerHTML=`
    <div class="stats">
      <div class="stat accent"><div class="k">支払総額（税込・累計）</div><div class="v"><span class="yen num">${yen(totalPay)}</span></div></div>
      <div class="stat"><div class="k">今月の発生額（税込）</div><div class="v"><span class="yen num">${yen(monthPay)}</span></div></div>
      <div class="stat warn"><div class="k">未払い残高（税込）</div><div class="v"><span class="yen num">${yen(unpaidTotal)}</span> <small>${unpaidCount}件</small></div></div>
      <div class="stat"><div class="k">紹介元 / 取引</div><div class="v"><span class="num">${DB.sources.length}</span><small>社・名</small> / <span class="num">${deals.length}</span><small>件</small></div></div>
    </div>

    <div class="card">
      <div class="card-h"><h2>紹介元別サマリー</h2>
        <button class="btn sm primary" onclick="go('deals')">＋ 取引を登録</button></div>
      <div class="card-b" style="padding:0">
        ${sourceSummaryTable()}
      </div>
    </div>

    <div class="card">
      <div class="card-h"><h2>直近の取引</h2></div>
      <div class="card-b" style="padding:0">${recentDealsTable()}</div>
    </div>
  `;
}
function sourceSummaryTable(){
  if(DB.sources.length===0)return emptyBox("紹介元がまだありません","「紹介元 管理」から登録してください");
  const rows=DB.sources.map(s=>{
    const ds=DB.deals.filter(d=>d.sourceId===s.id);
    let fee=0,tax=0,unpaid=0;
    ds.forEach(d=>{const f=feeOf(d),t=lineTaxOf(d);fee+=f;tax+=t;if(!d.paid)unpaid+=f+t;});
    return `<tr>
      <td><strong>${esc(s.name)}</strong> ${kindTag(s)} ${regTag(s)}</td>
      <td>${rateTag(s.taxRate)}</td>
      <td class="r num">${ds.length}</td>
      <td class="r num yen">${yen(fee)}</td>
      <td class="r num yen">${yen(fee+tax)}</td>
      <td class="r num yen" style="color:${unpaid>0?'var(--red)':'var(--muted)'}">${yen(unpaid)}</td>
    </tr>`;
  }).join("");
  return `<div class="tbl-wrap"><table>
    <thead><tr><th>紹介元</th><th>既定税率</th><th class="r">件数</th><th class="r">手数料(税抜)</th><th class="r">支払(税込)</th><th class="r">未払</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}
// 案件（注文）単位のグルーピング
function orderKeyOf(d){
  if(d.importKey && d.importKey.indexOf("#")>-1) return d.importKey.split("#")[0]; // bcart:{受注ID}
  return "single:"+d.id; // 手入力は1件＝1案件
}
function orderMetaOf(d){
  const m=(d.note||"").match(/受注(\S+?)(?:\s|\/|（|$)/);
  const c=(d.note||"").match(/（([^（）]*)）\s*$/);
  return {orderNo:m?m[1]:"", company:c?c[1]:""};
}
function groupOrders(deals){
  const map={};
  deals.forEach(d=>{
    const k=orderKeyOf(d);
    if(!map[k])map[k]={key:k,sourceId:d.sourceId,date:d.date||"",lines:[],fee:0,tax:0,base:0,paidCount:0,orderNo:"",company:""};
    const g=map[k];
    g.lines.push(d);
    g.fee+=feeOf(d);g.tax+=lineTaxOf(d);g.base+=(d.baseAmount||0);
    if(d.paid)g.paidCount++;
    if((d.date||"")>g.date)g.date=d.date;
    const meta=orderMetaOf(d);
    if(meta.orderNo&&!g.orderNo)g.orderNo=meta.orderNo;
    if(meta.company&&!g.company)g.company=meta.company;
  });
  return Object.values(map);
}
function orderStatusTag(g){
  if(g.paidCount>=g.lines.length)return '<span class="tag paid">支払済</span>';
  if(g.paidCount===0)return '<span class="tag unpaid">未払</span>';
  return `<span class="tag" style="background:var(--amber-bg);color:var(--amber)">一部 ${g.paidCount}/${g.lines.length}</span>`;
}
function orderLabel(g){
  const first=g.lines[0]?.productName||"（明細）";
  const more=g.lines.length>1?` <span style="color:var(--muted)">他${g.lines.length-1}件</span>`:"";
  const sub=[g.company,g.orderNo?("受注"+g.orderNo):""].filter(Boolean).join("　");
  return `${esc(first)}${more}${sub?`<div style="font-size:11px;color:var(--muted)">${esc(sub)}</div>`:""}`;
}
function recentDealsTable(){
  if(DB.deals.length===0)return emptyBox("取引がまだありません","「紹介取引 登録」または「CSV取込」から実績を入力してください");
  const orders=groupOrders(DB.deals).sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,8);
  return `<div class="tbl-wrap"><table>
    <thead><tr><th>日付</th><th>紹介元</th><th>案件（商品）</th><th class="r">対象額 計</th><th class="r">商品数</th><th class="r">手数料(税抜)</th><th class="r">税込</th><th>状態</th></tr></thead>
    <tbody>${orders.map(g=>`<tr>
      <td class="num">${g.date||"-"}</td>
      <td>${esc(srcName(g.sourceId))}</td>
      <td>${orderLabel(g)}</td>
      <td class="r num yen">${yen(g.base)}</td>
      <td class="r num">${g.lines.length}</td>
      <td class="r num yen">${yen(g.fee)}</td>
      <td class="r num yen"><strong>${yen(g.fee+g.tax)}</strong></td>
      <td>${orderStatusTag(g)}</td>
    </tr>`).join("")}</tbody></table></div>`;
}

  const q=dealFilter.trim().toLowerCase();

    || (g.company||"").toLowerCase().includes(q)
    || g.lines.some(l=>(l.productName||"").toLowerCase().includes(q)));
  return orders.sort((a,b)=>(b.date||"").localeCompare(a.date||""));

function calcPreview(){

  const fee=roundFn(base*rate/100);
  const tax=roundFn(fee*trate/100);
  box.innerHTML=`
    <div class="calc-row"><span class="lbl">紹介手数料（税抜）= ${yen(base)} × ${rate||0}%</span><span class="num yen">${yen(fee)}</span></div>
    <div class="calc-row"><span class="lbl">消費税（${trate}%）</span><span class="num yen">${yen(tax)}</span></div>
    <div class="calc-row total"><span>支払額（税込）</span><span class="num yen">${yen(fee+tax)}</span></div>`;
}

/* =========================================================
   支払明細書 発行（弊社が代行発行＝仕入明細書方式）
========================================================= */
let stmt={sourceId:"",from:"",to:"",onlyUnpaid:false,mode:"pay"};
function renderStatement(){
  const c=document.getElementById("content");
  if(DB.sources.length===0){c.innerHTML=`<div class="card"><div class="card-b">${emptyBox("紹介元がありません","先に紹介元と取引を登録してください")}</div></div>`;return;}
  const today=new Date();
  if(!stmt.from){const f=new Date(today.getFullYear(),today.getMonth(),1);stmt.from=f.toISOString().slice(0,10);}
  if(!stmt.to){const l=new Date(today.getFullYear(),today.getMonth()+1,0);stmt.to=l.toISOString().slice(0,10);}
  if(!stmt.sourceId)stmt.sourceId=DB.sources[0].id;
  const opts=DB.sources.map(s=>`<option value="${s.id}" ${stmt.sourceId===s.id?"selected":""}>${esc(s.name)}</option>`).join("");
  c.innerHTML=`
    <div class="card no-print">
      <div class="card-h"><h2>発行条件</h2></div>
      <div class="card-b">
        <div class="grid c4">
          <div class="field"><label>紹介元</label><select id="s_src">${opts}</select></div>
          <div class="field"><label>対象期間（開始）</label><input id="s_from" type="date" class="num" value="${stmt.from}"></div>
          <div class="field"><label>対象期間（終了）</label><input id="s_to" type="date" class="num" value="${stmt.to}"></div>
          <div class="field"><label>対象</label><select id="s_unpaid"><option value="0" ${!stmt.onlyUnpaid?"selected":""}>全件</option><option value="1" ${stmt.onlyUnpaid?"selected":""}>未払のみ</option></select></div>
        </div>
        <div class="field" style="max-width:560px"><label>発行形式</label>
          <select id="s_mode">
            <option value="pay" ${stmt.mode==="pay"?"selected":""}>弊社が発行（御中＝紹介元 ／ 発行元＝弊社）</option>
            <option value="invoice" ${stmt.mode==="invoice"?"selected":""}>紹介元名義で代行発行（御中＝弊社 ／ 発行元＝紹介元）</option>
          </select></div>
        <div style="display:flex;gap:10px">
          <button class="btn primary" onclick="buildStatement()">明細書を作成</button>
          <button class="btn" onclick="window.print()">印刷 / PDF保存</button>
          <button class="btn" onclick="markPeriodPaid()">対象期間を支払済にする</button>
        </div>
      </div>
    </div>
    <div id="stmtOut" style="margin-top:18px"></div>`;
  ["s_src","s_from","s_to","s_unpaid","s_mode"].forEach(id=>document.getElementById(id).addEventListener("change",()=>{syncStmt();buildStatement();}));
  buildStatement();
}
function syncStmt(){
  stmt.sourceId=val("s_src");stmt.from=val("s_from");stmt.to=val("s_to");stmt.onlyUnpaid=val("s_unpaid")==="1";stmt.mode=val("s_mode")||"pay";
}
function periodDeals(){
  syncStmt();
  return DB.deals.filter(d=>d.sourceId===stmt.sourceId
    && (!stmt.from||d.date>=stmt.from) && (!stmt.to||d.date<=stmt.to)
    && (!stmt.onlyUnpaid||!d.paid))
    .sort((a,b)=>(a.date||"").localeCompare(b.date||""));
}
function buildStatement(){
  const ds=periodDeals();
  const s=DB.sources.find(x=>x.id===stmt.sourceId);
  const out=document.getElementById("stmtOut");
  if(!s){out.innerHTML="";return;}
  if(ds.length===0){out.innerHTML=`<div class="card"><div class="card-b">${emptyBox("対象期間に取引がありません","期間や対象条件を変更してください")}</div></div>`;return;}

  // 税率ごとに税抜を集計 → 税率ごとに1回だけ端数処理（インボイス制度のルール）
  const byRate={};
  ds.forEach(d=>{const r=effRate(d);byRate[r]=(byRate[r]||0)+feeOf(d);});
  let netTotal=0,taxTotal=0;
  const taxRows=Object.keys(byRate).sort().map(r=>{
    const net=byRate[r];const tax=roundFn(net*r/100);
    netTotal+=net;taxTotal+=tax;
    return {r:+r,net,tax};
  });
  const grand=netTotal+taxTotal;
  const co=DB.company,bank=s.bank||{};

        </div>
      </div>

async function handleCSV(e){
  const f=e.target.files[0];if(!f)return;
  document.getElementById("csvName").textContent=f.name;
  try{
    const text=await readSmart(f);
    const rows=parseCSV(text).filter(r=>r.some(c=>String(c).trim()!==""));
    if(rows.length<2){toast("データ行が見つかりません");return;}
    const H={};rows[0].forEach((h,i)=>{H[String(h).replace(/^\uFEFF/,"").trim()]=i;});
    const need=["受注ID","商品名","小計","明細区分"];
    const miss=need.filter(n=>H[n]==null);
    if(miss.length){toast("想定の列が見つかりません："+miss.join("・"));return;}
    const col=(r,n)=>{const i=H[n];return i==null?"":(r[i]||"");};
    const numOf=v=>Number(String(v).replace(/[, ¥]/g,""))||0;
    // 受注IDごとにまとめる
    const map={};
    rows.slice(1).forEach(r=>{
      const oid=col(r,"受注ID").trim();if(!oid)return;
      if(!map[oid]){
        map[oid]={
          orderId:oid,
          orderNo:col(r,"受注番号").trim(),
          company:col(r,"会社名").trim(),
          person:col(r,"担当者").trim(),
          group:col(r,"価格グループ").trim(),
          memberId:col(r,"Bカート会員ID").trim(),
          date:(col(r,"受注日時").trim()||"").slice(0,10),
          lines:[]
        };
      }
      if(col(r,"明細区分").trim()!=="商品")return; // 送料・値引き等は除外
      map[oid].lines.push({
        seq:col(r,"受注内連番").trim(),
        code:col(r,"商品管理番号").trim()||col(r,"品番").trim(),
        name:col(r,"商品名").trim(),
        sub:numOf(col(r,"小計")),
        unit:numOf(col(r,"単価")),
        qty:numOf(col(r,"受注数")),
        taxRate:numOf(col(r,"税率"))||10
      });
    });
    importStage=Object.values(map).filter(o=>o.lines.length>0);
    if(importStage.length===0){toast("商品行が見つかりませんでした");return;}
    markAlready();
    drawImport();
  }catch(err){console.error(err);toast("CSVの読み込みに失敗しました");}
  e.target.value="";
}
// 文字コード自動判別（UTF-8優先、ダメならShift-JIS）
async function readSmart(file){
  const buf=await file.arrayBuffer();
  let t=new TextDecoder("utf-8").decode(buf);
  if(t.indexOf("受注")===-1 && t.indexOf("商品")===-1){
    try{t=new TextDecoder("shift_jis").decode(buf);}catch(e){}
  }
  return t.replace(/^\uFEFF/,"");
}
// 簡易CSVパーサ（"で囲まれたフィールド・改行に対応）
function parseCSV(text){
  const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(q){
      if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=ch;
    }else{
      if(ch==='"')q=true;
      else if(ch===','){row.push(cur);cur="";}
      else if(ch==='\r'){}
      else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur="";}
      else cur+=ch;
    }
  }
  if(cur!==""||row.length){row.push(cur);rows.push(row);}
  return rows;
}
function ikey(orderId,line){return "bcart:"+orderId+"#"+(line.code||line.seq||line.name);}

}

function recalcLine(oi,li){
  const l=importStage[oi].lines[li];
  const inp=document.getElementById(`mr_${oi}_${li}`);
  const fp=document.getElementById(`fp_${oi}_${li}`);
  if(!fp)return;
  const rate=inp?parseFloat(inp.value)||0:0;
  const fee=l.already?0:roundFn(l.sub*rate/100);
  fp.innerHTML='<span class="yen">'+yen(l.already?roundFn(l.sub*rate/100):fee)+'</span>';
  recalcOrder(oi);
}
function recalcOrder(oi){
  let sum=0;
  importStage[oi].lines.forEach((l,li)=>{
    if(l.already)return;
    const inp=document.getElementById(`mr_${oi}_${li}`);
    const rate=inp?parseFloat(inp.value)||0:0;
    sum+=roundFn(l.sub*rate/100);
  });
  const ot=document.getElementById(`ot_${oi}`);if(ot)ot.innerHTML='<span class="yen">'+yen(sum)+'</span>';
}
function importOrder(oi){
  const o=importStage[oi];
  const srcId=val(`src_${oi}`);
  if(!srcId){toast("還元先（紹介元）を選択してください");return;}
  let n=0;
  o.lines.forEach((l,li)=>{
    if(l.already)return;
    const rate=parseFloat(val(`mr_${oi}_${li}`))||0;
    if(rate<0||rate>10){return;}
    DB.deals.push({
      id:uid(),sourceId:srcId,date:o.date,
      productName:l.name,baseAmount:l.sub,marginRate:rate,
      taxRateOverride:null,
      note:`Bカート 受注${o.orderNo||o.orderId}${l.code?" / "+l.code:""}（${esc(o.company)}）`,
      paid:false,importKey:ikey(o.orderId,l)
    });
    if(l.code)DB.productMargins[l.code]=rate; // 商品別マージンを記憶
    l.already=true;n++;
  });
  if(n===0){toast("取り込める明細がありません（率は0〜10%、取込済を除く）");return;}
  save();markAlready();drawImport();toast(`${n}件を取り込みました`);
}
function importAll(){
  let done=0,skipped=0;
  importStage.forEach((o,oi)=>{
    const srcId=val(`src_${oi}`);
    if(!srcId){skipped++;return;}
    o.lines.forEach((l,li)=>{
      if(l.already)return;
      const rate=parseFloat(val(`mr_${oi}_${li}`))||0;
      if(rate<0||rate>10)return;
      DB.deals.push({id:uid(),sourceId:srcId,date:o.date,productName:l.name,baseAmount:l.sub,marginRate:rate,taxRateOverride:null,note:`Bカート 受注${o.orderNo||o.orderId}${l.code?" / "+l.code:""}（${esc(o.company)}）`,paid:false,importKey:ikey(o.orderId,l)});
      if(l.code)DB.productMargins[l.code]=rate;l.already=true;done++;
    });
  });
  save();markAlready();drawImport();
  toast(done?`${done}件を取り込みました${skipped?`（紹介元未選択の${skipped}注文はスキップ）`:""}`:"紹介元が未選択のため取り込めませんでした");
}

/* =========================================================
   汎用 UI ヘルパ
========================================================= */
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
function val(id){const e=document.getElementById(id);return e?e.value:"";}
function kindTag(s){return s.kind==="company"?'<span class="tag corp">法人</span>':'<span class="tag indiv">個人</span>';}
function regTag(s){return s.invoiceRegistered?'<span class="tag reg">登録</span>':'<span class="tag noreg">未登録</span>';}
function rateTag(r){return r===8?'<span class="tag r8">8%</span>':'<span class="tag r10">10%</span>';}
function emptyBox(big,sub){return `<div class="empty"><div class="big">${big}</div>${sub?`<div>${sub}</div>`:""}</div>`;}
function dl(blob,name){const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href);}

let onSave=null;
function modal(title,body,save){
  onSave=save;
  document.getElementById("modal").innerHTML=`
    <div class="modal-h"><h3>${title}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-b">${body}</div>
    <div class="modal-f"><button class="btn ghost" onclick="closeModal()">キャンセル</button><button class="btn primary" onclick="doSave()">保存</button></div>`;
  document.getElementById("modalBg").classList.add("open");
}
function confirmModal(title,body,ok){
  onSave=null;
  document.getElementById("modal").innerHTML=`
    <div class="modal-h"><h3>${title}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-b"><p style="margin:0">${body}</p></div>
    <div class="modal-f"><button class="btn ghost" onclick="closeModal()">キャンセル</button><button class="btn danger" id="okBtn">実行</button></div>`;
  document.getElementById("modalBg").classList.add("open");
  document.getElementById("okBtn").onclick=()=>{closeModal();ok();};
}
function doSave(){if(onSave){const r=onSave();if(r!==false)closeModal();}}
function closeModal(){document.getElementById("modalBg").classList.remove("open");onSave=null;}
document.getElementById("modalBg").addEventListener("click",e=>{if(e.target.id==="modalBg")closeModal();});

let toastT;
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2200);}

/* 起動 */
go("dashboard");
</script>
</body>
</html>
